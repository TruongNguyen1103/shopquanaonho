<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
</head>
<body>

    <!--<h1>📦 Đơn hàng của tôi</h1>-->
    <div id="orderList"></div>
    <script>
// ===== KIỂM TRA ĐĂNG NHẬP =====
let currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
    alert("Vui lòng đăng nhập để xem đơn hàng!");
    window.location.href = "index.html";
} else {

let allOrders =
JSON.parse(localStorage.getItem("orders")) || [];

// Chỉ lấy đơn hàng thuộc về tài khoản đang đăng nhập.
// Đơn hàng cũ (tạo trước khi có trường "owner") sẽ không hiện ra nữa
// vì không xác định được là của ai.
let orders = allOrders.filter(order => order.owner === currentUser);

function renderOrders(){
    let html = "";

    orders.forEach((order, index)=>{

        html += `
        <div style="border:1px solid #ccc;
                    padding:10px;
                    margin:10px;">
            <h3>Đơn hàng #${index+1}</h3>
            <p>Mã đơn: ${order.orderId}</p>
            <p>Ngày: ${order.createdAt}</p>
            <p>Tổng tiền:
            ${Number(order.total).toLocaleString()}đ</p>
            <button onclick="deleteOrder(${index})"
                    style="background:red;color:white;border:none;
                           padding:8px 12px;border-radius:5px;cursor:pointer;">
                Xóa đơn hàng
            </button>
        </div>
        `;
    });

    document.getElementById("orderList").innerHTML =
    html || "Chưa có đơn hàng nào";
}

function deleteOrder(index){
    if(!confirm("Bạn có chắc muốn xóa đơn hàng này?")) return;

    // Xác định đúng đơn hàng cần xóa trong mảng gốc (allOrders)
    // bằng cách so khớp orderId, tránh xóa nhầm đơn của người khác.
    const target = orders[index];
    const realIndex = allOrders.findIndex(o => o.orderId === target.orderId);

    if(realIndex !== -1){
        allOrders.splice(realIndex, 1);
        localStorage.setItem("orders", JSON.stringify(allOrders));
    }

    orders.splice(index, 1);
    renderOrders();
}

renderOrders();

}
    </script>

</body>
</html>
