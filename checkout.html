<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>
<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.box{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
.product-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border:1px solid #ddd;
    margin-bottom:10px;
    border-radius:8px;
    background:#fafafa;
}
select,input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="box">

<h2>Thanh toán đơn hàng</h2>

<h3>Sản phẩm đã chọn</h3>

<div id="selectedProducts"></div>

<p id="total"></p>

<p id="wallet"></p>

<input type="number"
id="depositAmount"
placeholder="Nhập số tiền cần nạp">

<button onclick="depositMoney()">
💰 Nạp tiền vào ví
</button>

<input type="text" id="customerName" placeholder="Họ tên">
<input type="text" id="customerPhone" placeholder="Số điện thoại">
<input type="text" id="customerAddress" placeholder="Địa chỉ">

<select id="paymentMethod">

<option value="WALLET">
Ví Fashion Shop
</option>

<option value="BANK">
Chuyển khoản ngân hàng
</option>

<option value="COD">
Thanh toán khi nhận hàng
</option>

</select>

<button onclick="pay()">
Đặt hàng
</button>

</div>

<script>
let products =
JSON.parse(localStorage.getItem("cartItems")) || [];

let html = "";

products.forEach(item=>{

    html += `
    <div class="product-item">
        <span>${item.name}</span>
        <span>${item.price.toLocaleString()}đ</span>
    </div>
    `;

});

document.getElementById("selectedProducts").innerHTML =
html;
let total =
Number(localStorage.getItem("checkoutTotal"));

document.getElementById("total").innerHTML =
"Tổng tiền: " + total.toLocaleString() + "đ";

let wallet =
Number(localStorage.getItem("walletBalance") || 0);

document.getElementById("wallet").innerHTML =
"Số dư ví: " + wallet.toLocaleString() + "đ";

document.getElementById("customerName").value =
localStorage.getItem("username") || "";

document.getElementById("customerPhone").value =
localStorage.getItem("phone") || "";

document.getElementById("customerAddress").value =
localStorage.getItem("address") || "";
function depositMoney(){
let amount =
Number(document.getElementById("depositAmount").value);

if(amount <= 0){
    alert("Nhập số tiền hợp lệ!");
    return;
}

let wallet =
Number(localStorage.getItem("walletBalance") || 0);

wallet += amount;

localStorage.setItem("walletBalance", wallet);

document.getElementById("wallet").innerHTML =
"Số dư ví: " + wallet.toLocaleString() + "đ";

alert("Nạp tiền thành công!");

document.getElementById("depositAmount").value = "";
}
async function pay(){

let order = {
    customerName:
    document.getElementById("customerName").value,

    customerPhone:
    document.getElementById("customerPhone").value,

    customerAddress:
    document.getElementById("customerAddress").value,

    products: products,

    total: total,

    paymentMethod:
    document.getElementById("paymentMethod").value,

    createdAt:
    new Date().toLocaleString()
};

await saveOrder(order);

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

orders.push(order);

localStorage.setItem(
    "orders",
    JSON.stringify(orders)
);

let method =
document.getElementById("paymentMethod").value;

if(method === "WALLET"){

    let balance =
    Number(localStorage.getItem("walletBalance") || 0);

    if(balance < total){
        alert("Số dư ví không đủ!");
        return;
    }

    balance -= total;

    localStorage.setItem("walletBalance", balance);

    alert("Thanh toán bằng ví thành công!");

    localStorage.removeItem("cartItems");
    localStorage.removeItem("checkoutTotal");

    window.location.href = "index.html";

}

else if(method === "BANK"){
    window.location.href = "bank.html";
}
else{

    alert("Đặt hàng thành công!\nThanh toán khi nhận hàng.");

    localStorage.removeItem("cartItems");
    localStorage.removeItem("checkoutTotal");
    window.location.href = "index.html";
        }
         }
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwV5duPecj4b-CJo1XaAJflB1Yr-hyG14",
  authDomain: "fashionshop-feb45.firebaseapp.com",
  projectId: "fashionshop-feb45",
  storageBucket: "fashionshop-feb45.firebasestorage.app",
  messagingSenderId: "138813420376",
  appId: "1:138813420376:web:18f17410c4840e05b8ab2d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveOrder = async function(order){
    await addDoc(collection(db, "orders"), order);
};

</script>
</body>
</html>
